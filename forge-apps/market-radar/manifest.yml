app:
  id: ari:cloud:ecosystem::app/51430985-23b0-4c61-9533-95df091e10eb
  runtime:
    name: nodejs24.x

permissions:
  scopes:
    - read:jira-work
    - storage:app
  external:
    fetch:
      backend:
        - "https://db-proxy.example.com"

modules:
  jira:dashboardGadget:
    - key: market-radar-gadget
      resource: main
      resolver:
        function: resolver
      title: Market Radar
      description: Real-time market sentiment, Fed policy, and sector rotation powered
        by CockroachDB
      icon: https://developer.atlassian.com/platform/forge/images/icons/analytics-icon.svg
      thumbnail: https://developer.atlassian.com/platform/forge/images/logos/atlassian-logo.svg

  webtrigger:
    - key: market-radar-webtrigger
      function: webhook-handler

  function:
    - key: resolver
      handler: index.handler
    - key: webhook-handler
      handler: webhook.handler

resources:
  - key: main
    path: src/frontend
